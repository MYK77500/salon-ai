<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Salon AI</title>
</head>

<body style="font-family: Arial; padding: 30px; max-width: 900px; margin: auto;">

  <h1>Recherche cliente</h1>

  <input
    type="text"
    id="search"
    placeholder="Nom ou prénom"
    style="padding:10px; width:300px;"
  />

  <button onclick="searchClients()" style="padding:10px;">Rechercher</button>

  <div id="matches" style="margin-top:20px;"></div>
  <div id="result" style="margin-top:30px;"></div>

  <script>
    const SUPABASE_URL = "https://nzlhhwzfubxgqvguxehi.supabase.co";

    // https://nzlhhwzfubxgqvguxehi.supabase.co
    const SUPABASE_KEY = "sb_secret_6ZDiA8spKI6i7PNE6R6BuQ_9mfvQK_J";

    async function searchClients() {
      const q = document.getElementById("search").value.trim();

      document.getElementById("matches").innerHTML = "";
      document.getElementById("result").innerHTML = "";

      if (!q) return;

      const headers = {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      };

      const urlNom = `${SUPABASE_URL}/rest/v1/app_clientes_v1?select=numero_client,nom,prenom&nom=ilike.*${encodeURIComponent(q)}*`;
      const urlPrenom = `${SUPABASE_URL}/rest/v1/app_clientes_v1?select=numero_client,nom,prenom&prenom=ilike.*${encodeURIComponent(q)}*`;

      const [resNom, resPrenom] = await Promise.all([
        fetch(urlNom, { headers }),
        fetch(urlPrenom, { headers })
      ]);

      const dataNom = await resNom.json();
      const dataPrenom = await resPrenom.json();

      const fusion = [...dataNom, ...dataPrenom];

      const seen = new Set();
      const uniques = [];

      fusion.forEach(c => {
        if (!seen.has(c.numero_client)) {
          seen.add(c.numero_client);
          uniques.push(c);
        }
      });

      if (uniques.length === 0) {
        document.getElementById("matches").innerHTML = "Aucune cliente trouvée";
        return;
      }

      let html = "<h3>Résultats :</h3>";

      uniques.forEach(c => {
        html += `
          <div onclick="loadClient('${c.numero_client}')"
            style="padding:10px; border:1px solid #ccc; margin-bottom:5px; cursor:pointer;">
            ${c.nom || ""} ${c.prenom || ""}
          </div>
        `;
      });

      document.getElementById("matches").innerHTML = html;
    }

    async function loadClient(numeroClient) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/app_clientes_v1?numero_client=eq.${numeroClient}`,
        {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY
          }
        }
      );

      const data = await res.json();

      if (data.length === 0) return;

      const c = data[0];

      document.getElementById("result").innerHTML = `
        <h2>${c.nom} ${c.prenom}</h2>

        <p><strong>Visites :</strong> ${c.visites_total}</p>
        <p><strong>Fiche moyenne :</strong> ${c.fiche_moyenne}</p>

        <h3>Dernière visite</h3>
        <p>${c.derniere_date}</p>
        <p>${c.detail_visite_1}</p>

        <h3>Recommandation</h3>
        <p>${c.recommandation_v1}</p>

        <h3>Phrase</h3>
        <p>${c.phrase_vente_v1}</p>
      `;
    }
  </script>

</body>
</html>
