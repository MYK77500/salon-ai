<!DOCTYPE html>
<html>
<head>
  <title>Salon AI</title>
  <meta charset="UTF-8">
</head>

<body style="font-family: Arial; padding: 40px;">

  <h1>🔍 Recherche cliente</h1>

  <input type="text" id="client" placeholder="Numéro client" style="padding:10px; width:300px;">
  <button onclick="searchClient()" style="padding:10px;">Rechercher</button>

  <div id="result" style="margin-top:30px;"></div>

  <script>
    const SUPABASE_URL = "https://nzlhhwzfubxgqvguxehi.supabase.co";
    const SUPABASE_KEY = "sb_secret_6ZDiA8spKI6i7PNE6R6BuQ_9mfvQK_J";

    async function searchClient() {
      const client = document.getElementById("client").value;

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/recommandation_v2?numero_client=eq.${client}`,
        {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
          },
        }
      );

      const data = await res.json();

      if (data.length === 0) {
        document.getElementById("result").innerHTML = "Cliente non trouvée";
        return;
      }

      const c = data[0];

      document.getElementById("result").innerHTML = `
        <h2>Cliente ${c.numero_client}</h2>
        <p><strong>Dernière visite :</strong> ${c.derniere_date}</p>
        <p><strong>Prestation :</strong> ${c.detail_visite_1}</p>
        <p><strong>Recommandation :</strong> ${c.recommandation_v1}</p>
        <p><strong>Phrase :</strong> ${c.phrase_vente_v1}</p>
      `;
    }
  </script>

</body>
</html>
